{% extends 'base.html' %}
{% block title %}Reset Password - Skill-Exchange{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5">

        <div class="card border-0 shadow rounded-4 overflow-hidden">
            <div class="card-header bg-white text-center border-0 pt-5 pb-3">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                    style="width:64px;height:64px;background:linear-gradient(135deg,#198754,#0d6efd);">
                    <i class="bi bi-shield-lock-fill text-white" style="font-size:1.8rem;"></i>
                </div>
                <h4 class="fw-bold mb-1">Set New Password</h4>
                <p class="text-muted small">
                    Resetting password for <strong>{{ email }}</strong>
                </p>
            </div>

            <div class="card-body px-5 pb-5">
                <form method="POST" id="reset-form">

                    <div class="mb-3">
                        <label class="form-label text-secondary fw-semibold small text-uppercase">
                            New Password
                        </label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-key text-primary"></i>
                            </span>
                            <input type="password"
                                name="new_password"
                                id="new-password"
                                class="form-control bg-light border-start-0 ps-0"
                                placeholder="Minimum 6 characters"
                                minlength="6"
                                required
                                autofocus>
                            <button class="btn btn-outline-secondary border-start-0"
                                type="button" id="toggle-new"
                                title="Show/hide password">
                                <i class="bi bi-eye" id="eye-new"></i>
                            </button>
                        </div>

                        <!-- Strength meter -->
                        <div class="mt-2">
                            <div class="progress rounded-pill" style="height:5px;">
                                <div id="strength-bar" class="progress-bar rounded-pill" style="width:0%;transition:width .3s;"></div>
                            </div>
                            <small id="strength-label" class="text-muted">Enter a password</small>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary fw-semibold small text-uppercase">
                            Confirm New Password
                        </label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-key-fill text-primary"></i>
                            </span>
                            <input type="password"
                                name="confirm_password"
                                id="confirm-password"
                                class="form-control bg-light border-start-0 ps-0"
                                placeholder="Repeat new password"
                                required>
                            <button class="btn btn-outline-secondary border-start-0"
                                type="button" id="toggle-confirm">
                                <i class="bi bi-eye" id="eye-confirm"></i>
                            </button>
                        </div>
                        <small id="match-label" class="text-muted"></small>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" id="submit-btn"
                            class="btn btn-success btn-lg rounded-pill fw-bold shadow-sm">
                            <i class="bi bi-check-circle me-2"></i>Reset Password
                        </button>
                    </div>
                </form>

                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}" class="text-muted small text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Back to Login
                    </a>
                </div>
            </div>
        </div>

        <!-- Requirements card -->
        <div class="card border-0 bg-light rounded-4 mt-3 p-3">
            <div class="d-flex align-items-start gap-3">
                <i class="bi bi-shield-check text-success mt-1"></i>
                <div class="small text-muted">
                    <strong>Password requirements:</strong>
                    <ul class="mb-0 mt-1 ps-3">
                        <li>At least 6 characters long</li>
                        <li>Both passwords must match</li>
                    </ul>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
// Toggle visibility for new password
document.getElementById('toggle-new').addEventListener('click', function () {
    const inp = document.getElementById('new-password');
    const eye = document.getElementById('eye-new');
    if (inp.type === 'password') {
        inp.type = 'text';
        eye.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        eye.className = 'bi bi-eye';
    }
});

// Toggle visibility for confirm password
document.getElementById('toggle-confirm').addEventListener('click', function () {
    const inp = document.getElementById('confirm-password');
    const eye = document.getElementById('eye-confirm');
    if (inp.type === 'password') {
        inp.type = 'text';
        eye.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        eye.className = 'bi bi-eye';
    }
});

// Password strength meter
document.getElementById('new-password').addEventListener('input', function () {
    const val = this.value;
    const bar = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    let strength = 0;
    if (val.length >= 6) strength++;
    if (val.length >= 10) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const levels = [
        { pct: 0,   cls: '',          text: 'Enter a password' },
        { pct: 20,  cls: 'bg-danger', text: 'Very weak' },
        { pct: 40,  cls: 'bg-warning',text: 'Weak' },
        { pct: 60,  cls: 'bg-info',   text: 'Fair' },
        { pct: 80,  cls: 'bg-primary',text: 'Strong' },
        { pct: 100, cls: 'bg-success',text: '💪 Very strong' },
    ];
    const l = levels[Math.min(strength, 5)];
    bar.style.width = l.pct + '%';
    bar.className = 'progress-bar rounded-pill ' + l.cls;
    label.textContent = l.text;
    label.className = 'text-muted small';
});

// Match checker
document.getElementById('confirm-password').addEventListener('input', function () {
    const pw   = document.getElementById('new-password').value;
    const label = document.getElementById('match-label');
    if (!this.value) {
        label.textContent = '';
    } else if (this.value === pw) {
        label.textContent = '✅ Passwords match';
        label.className = 'text-success small';
    } else {
        label.textContent = '❌ Passwords do not match';
        label.className = 'text-danger small';
    }
});

// Disable submit button when submitting
document.getElementById('reset-form').addEventListener('submit', function () {
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Resetting...';
});
</script>
{% endblock %}
